<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Records</title>
<link rel="stylesheet" href="../static/students.css">


</head>

<body>

<div class="container">

<h1>Students Record</h1>

<table>

<tr>
<th>Student Name</th>
<th>Father Name</th>
<th>Course</th>
</tr>

{% for student in students %}

<tr>
<td>{{ student.name }}</td>
<td>{{ student.fName }}</td>
<td>{{ student.course }}</td>
</tr>

{% else %}

<tr>
<td colspan="3" class="no-data">No Students Found</td>
</tr>

{% endfor %}

</table>

<a href="/" class="back-btn">Add New Student</a>

</div>

</body>
</html>
